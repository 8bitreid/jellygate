services:
  jellygate:
    build: .
    container_name: jellygate-dev
    env_file: [.env.dev]
    network_mode: host
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: jellygate-db-dev
    environment:
      POSTGRES_DB: jellygate
      POSTGRES_USER: jellygate
      POSTGRES_PASSWORD: devpass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellygate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
