services:
  jellygate:
    build: .
    container_name: jellygate-dev
    env_file: [.env.dev]
    network_mode: host
    depends_on:
      jellyfin:
        condition: service_healthy
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: jellygate-db-dev
    environment:
      POSTGRES_DB: jellygate
      POSTGRES_USER: jellygate
      POSTGRES_PASSWORD: devpass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellygate"]
      interval: 5s
      timeout: 5s
      retries: 5

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellygate-jellyfin-dev
    ports:
      - "8097:8096"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
    restart: unless-stopped

volumes:
  pgdata_dev:
  jellyfin_config:
  jellyfin_cache:
