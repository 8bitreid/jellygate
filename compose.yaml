services:
  jellygate:
    build: .
    container_name: jellygate
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "127.0.0.1:8080:8080"
      - "100.77.129.78:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jellygate
      POSTGRES_USER: jellygate
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellygate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
