{{ define "base" }}
  <!doctype html>
  <html class="dark" lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>{{ block "title" . }}The Family Cinema{{ end }}</title>
      <link
        rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎬</text></svg>"
      />
      <script src="/static/tailwind.js"></script>
      <!-- prettier-ignore -->
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" crossorigin="anonymous" />
      <!-- NOSONAR -->
      <!-- prettier-ignore -->
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" crossorigin="anonymous" />
      <!-- NOSONAR -->
      <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "tertiary-fixed-dim": "#bac6e8",
                "tertiary-fixed": "#d8e2ff",
                "on-tertiary": "#24304b",
                "on-primary-fixed-variant": "#004c69",
                "primary-fixed-dim": "#7bd0ff",
                outline: "#87929a",
                "on-tertiary-fixed": "#0e1b35",
                "error-container": "#93000a",
                "on-secondary-fixed-variant": "#6e2288",
                secondary: "#efb0ff",
                "on-primary": "#003549",
                "surface-container-highest": "#33353a",
                "secondary-fixed-dim": "#efb0ff",
                "inverse-primary": "#00668a",
                "on-surface": "#e2e2e9",
                "surface-container-high": "#282a2f",
                "inverse-surface": "#e2e2e9",
                "surface-container-lowest": "#0c0e13",
                "on-secondary": "#54006e",
                "secondary-fixed": "#fad7ff",
                tertiary: "#bac6e8",
                "surface-container": "#1e1f25",
                "on-secondary-container": "#e99bff",
                "on-tertiary-container": "#24314c",
                "surface-variant": "#33353a",
                "on-background": "#e2e2e9",
                "on-surface-variant": "#bdc8d0",
                "on-error": "#690005",
                "surface-container-low": "#1a1b21",
                "on-error-container": "#ffdad6",
                "surface-bright": "#37393f",
                error: "#ffb4ab",
                "on-tertiary-fixed-variant": "#3a4663",
                "outline-variant": "#3e484f",
                "inverse-on-surface": "#2e3036",
                "secondary-container": "#71258b",
                "on-secondary-fixed": "#330044",
                "primary-container": "#00a4dc",
                surface: "#111318",
                "surface-dim": "#111318",
                "on-primary-fixed": "#001e2c",
                "tertiary-container": "#8c99b9",
                "surface-tint": "#7bd0ff",
                "on-primary-container": "#00354a",
                primary: "#7bd0ff",
                "primary-fixed": "#c3e7ff",
                background: "#111318",
              },
              borderRadius: {
                DEFAULT: "0.25rem",
                lg: "0.5rem",
                xl: "0.75rem",
                full: "9999px",
              },
              fontFamily: {
                headline: ["Manrope"],
                body: ["Inter"],
                label: ["Inter"],
              },
            },
          },
        };
      </script>
      <style>
        .material-symbols-outlined {
          font-variation-settings:
            "FILL" 0,
            "wght" 400,
            "GRAD" 0,
            "opsz" 24;
        }
        .glass-panel {
          background: rgba(51, 53, 58, 0.6);
          backdrop-filter: blur(20px);
        }
      </style>
      <link rel="stylesheet" href="/static/style.css" />
      {{ block "head" . }}{{ end }}
    </head>
    <body
      class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-white"
    >
      {{ block "header" . }}
        <header
          class="fixed top-0 z-50 w-full bg-[#111318] flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto left-0 right-0"
        >
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#7bd0ff]">movie_filter</span>
            <h1 class="text-xl font-bold tracking-tighter text-[#e2e2e9] font-headline">
              The Family Cinema
            </h1>
          </div>
          <div class="flex items-center gap-6">
            {{ if .Username }}
              <nav class="hidden md:flex items-center gap-8 font-headline text-sm font-bold">
                <a class="text-[#7bd0ff]" href="/admin">Invites</a>
                <a
                  class="text-[#e2e2e9]/60 hover:bg-[#33353a]/50 transition-colors duration-300 px-3 py-1 rounded-lg"
                  href="/admin/settings"
                  >Settings</a
                >
              </nav>
              <div class="flex items-center gap-4">
                <div
                  class="h-10 w-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/20"
                >
                  <span
                    class="material-symbols-outlined text-on-surface-variant"
                    style="font-size:20px"
                    >person</span
                  >
                </div>
                <form method="POST" action="/admin/logout">
                  <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}" />
                  <button
                    class="hidden md:block px-6 py-2 rounded-lg bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest transition-colors font-medium"
                  >
                    Sign Out
                  </button>
                </form>
              </div>
            {{ end }}
          </div>
        </header>
      {{ end }}
      <main class="pt-24 pb-32 px-6 max-w-7xl mx-auto min-h-screen">
        {{ if .Flash }}
          <div
            class="mb-6 p-4 rounded-xl {{ if eq .FlashType "error" }}
              bg-error-container/20 border border-error/20 text-error
            {{ else }}
              bg-primary/10 border border-primary/20 text-primary
            {{ end }}"
          >
            {{ .Flash }}
          </div>
        {{ end }}
        {{ block "content" . }}{{ end }}
      </main>
    </body>
  </html>
{{ end }}
