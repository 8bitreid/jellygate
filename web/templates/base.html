{{ define "base" }}
  <!doctype html>
  <html class="dark" lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>{{ block "title" . }}The Family Cinema{{ end }}</title>
      <link
        rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎬</text></svg>"
      />
      <link rel="stylesheet" href="/static/style.css" />
      <!-- prettier-ignore -->
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" crossorigin="anonymous" />
      <!-- NOSONAR -->
      <!-- prettier-ignore -->
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" crossorigin="anonymous" />
      <!-- NOSONAR -->
      {{ block "head" . }}{{ end }}
    </head>
    <body
      class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-white"
    >
      {{ block "header" . }}
        <header
          class="fixed top-0 z-50 w-full bg-[#111318] flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto left-0 right-0"
        >
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#7bd0ff]">movie_filter</span>
            <h1 class="text-xl font-bold tracking-tighter text-[#e2e2e9] font-headline">
              The Family Cinema
            </h1>
          </div>
          <div class="flex items-center gap-6">
            {{ if .Username }}
              <nav class="hidden md:flex items-center gap-8 font-headline text-sm font-bold">
                <a class="text-[#7bd0ff]" href="/admin">Invites</a>
                <a
                  class="text-[#e2e2e9]/60 hover:bg-[#33353a]/50 transition-colors duration-300 px-3 py-1 rounded-lg"
                  href="/admin/settings"
                  >Settings</a
                >
              </nav>
              <div class="flex items-center gap-4">
                <div
                  class="h-10 w-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/20"
                >
                  <span
                    class="material-symbols-outlined text-on-surface-variant"
                    style="font-size:20px"
                    >person</span
                  >
                </div>
                <form method="POST" action="/admin/logout">
                  <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}" />
                  <button
                    class="hidden md:block px-6 py-2 rounded-lg bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest transition-colors font-medium"
                  >
                    Sign Out
                  </button>
                </form>
              </div>
            {{ end }}
          </div>
        </header>
      {{ end }}
      <main class="pt-24 pb-32 px-6 max-w-7xl mx-auto min-h-screen">
        {{ if .Flash }}
          <div
            class="mb-6 p-4 rounded-xl {{ if eq .FlashType "error" }}
              bg-error-container/20 border border-error/20 text-error
            {{ else }}
              bg-primary/10 border border-primary/20 text-primary
            {{ end }}"
          >
            {{ .Flash }}
          </div>
        {{ end }}
        {{ block "content" . }}{{ end }}
      </main>
    </body>
  </html>
{{ end }}
