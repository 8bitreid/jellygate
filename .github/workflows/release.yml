name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation (when upgrading from SA key)

env:
  IMAGE: gcr.io/${{ vars.GCR_PROJECT_ID }}/jellygate

jobs:
  test:
    runs-on: ubuntu-latest
    container: golang:1.25-alpine
    steps:
      - uses: actions/checkout@v4

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -count=1

  build-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Option A (recommended upgrade path): Workload Identity Federation ──
      # Uncomment this block and remove Option B once WIF is configured in GCP.
      # See GCP setup instructions in the repository README.
      #
      # - name: Authenticate to Google Cloud (WIF)
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER'
      #     service_account: 'jellygate-gcr-push@PROJECT_ID.iam.gserviceaccount.com'

      # ── Option B (current): Service Account JSON key ────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCR_SA_KEY }}'

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
