name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE: ghcr.io/8bitreid/jellygate

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container: golang:1.25-alpine
    steps:
      - uses: actions/checkout@v4

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -count=1

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --current --strip all

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes-file "${{ steps.cliff.outputs.changelog }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

